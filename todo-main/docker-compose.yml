version: "3.8"

services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: todos
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: todos
      POSTGRES_IP: db
      POSTGRES_PORT: 5432
      SECRET_KEY: bd7b50712f72281dff3211149c3356a1f48107138bc6c20b1a2069f518a55502
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REDIS_HOST: redis://redis:6379