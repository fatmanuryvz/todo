<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TodoApp ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Righteous&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --blue1: #0ea5e9;
      --blue2: #6366f1;
      --blue3: #38bdf8;
      --accent: #f472b6;
      --accent2: #facc15;
      --accent3: #34d399;
      --bg: #0f172a;
      --bg2: #1e293b;
      --bg3: #334155;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --card: rgba(30,41,59,0.85);
      --radius: 18px;
      --shadow: 0 8px 32px rgba(14,165,233,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 10%, rgba(99,102,241,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 80%, rgba(14,165,233,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(244,114,182,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 0 auto;
      padding: 32px 16px 60px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: slideDown 0.7s cubic-bezier(.34,1.56,.64,1) both;
    }

    .logo {
      font-family: 'Righteous', cursive;
      font-size: 2.8rem;
      background: linear-gradient(135deg, var(--blue3), var(--blue2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      line-height: 1;
    }

    .logo-emoji {
      display: inline-block;
      animation: bounce 2s infinite;
      -webkit-text-fill-color: initial;
      font-size: 2.4rem;
    }

    .subtitle {
      color: var(--text2);
      font-size: 0.95rem;
      margin-top: 6px;
      font-weight: 600;
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: var(--radius);
      padding: 28px;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      animation: fadeUp 0.5s ease both;
    }

    .card + .card { margin-top: 20px; }

    .card-title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title span { font-size: 1.2rem; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      border: 2px solid rgba(99,102,241,0.3);
      background: transparent;
      color: var(--text2);
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--blue2), var(--blue1));
      border-color: transparent;
      color: white;
      box-shadow: 0 4px 16px rgba(99,102,241,0.4);
      transform: translateY(-1px);
    }

    .tab:hover:not(.active) {
      border-color: var(--blue1);
      color: var(--blue3);
    }

    /* Form */
    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(15,23,42,0.7);
      border: 2px solid rgba(99,102,241,0.25);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.2s;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--blue1);
      box-shadow: 0 0 0 4px rgba(14,165,233,0.15);
    }

    .form-input::placeholder { color: var(--text2); opacity: 0.6; }

    /* Button */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue2), var(--blue1));
      color: white;
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(99,102,241,0.5);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn:active::after { opacity: 0.1; }

    /* Message */
    .msg {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 700;
      margin-top: 14px;
      display: none;
      animation: fadeUp 0.3s ease;
    }

    .msg.success { background: rgba(52,211,153,0.15); border: 1px solid var(--accent3); color: var(--accent3); display: block; }
    .msg.error { background: rgba(244,114,182,0.15); border: 1px solid var(--accent); color: var(--accent); display: block; }

    /* User info bar */
    .user-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 14px;
      padding: 14px 20px;
      margin-bottom: 20px;
      animation: fadeUp 0.4s ease;
    }

    .user-bar.visible { display: flex; }

    .user-email {
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--blue3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue2), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 900;
      color: white;
    }

    .btn-logout {
      padding: 8px 16px;
      background: rgba(244,114,182,0.15);
      border: 1px solid rgba(244,114,182,0.4);
      border-radius: 10px;
      color: var(--accent);
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover { background: rgba(244,114,182,0.25); }

    /* Add todo section */
    .add-section { display: none; }
    .add-section.visible { display: block; }

    .add-row {
      display: flex;
      gap: 10px;
    }

    .add-row .form-input { flex: 1; }

    .btn-add {
      padding: 13px 20px;
      background: linear-gradient(135deg, var(--accent3), #059669);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 1.3rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-add:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(52,211,153,0.4); }

    /* Todo list */
    .todos-section { display: none; }
    .todos-section.visible { display: block; }

    .todos-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .todos-count {
      background: linear-gradient(135deg, var(--blue2), var(--blue1));
      color: white;
      font-size: 0.78rem;
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .btn-refresh {
      padding: 8px 14px;
      background: rgba(14,165,233,0.12);
      border: 1px solid rgba(14,165,233,0.3);
      border-radius: 10px;
      color: var(--blue3);
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-refresh:hover { background: rgba(14,165,233,0.22); }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .todo-list::-webkit-scrollbar { width: 5px; }
    .todo-list::-webkit-scrollbar-track { background: transparent; }
    .todo-list::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 10px; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: rgba(15,23,42,0.6);
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: 14px;
      padding: 16px;
      transition: all 0.2s;
      animation: fadeUp 0.35s ease both;
    }

    .todo-item:hover {
      border-color: rgba(99,102,241,0.4);
      transform: translateX(3px);
      box-shadow: 0 4px 20px rgba(99,102,241,0.1);
    }

    .todo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue1), var(--blue2));
      margin-top: 5px;
      flex-shrink: 0;
      box-shadow: 0 0 8px rgba(14,165,233,0.5);
    }

    .todo-content { flex: 1; min-width: 0; }

    .todo-title {
      font-size: 0.98rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .todo-desc {
      font-size: 0.82rem;
      color: var(--text2);
      font-weight: 600;
    }

    .todo-meta {
      font-size: 0.75rem;
      color: var(--text2);
      opacity: 0.6;
      margin-top: 4px;
      font-weight: 600;
    }

    .btn-delete {
      padding: 7px 12px;
      background: rgba(244,114,182,0.1);
      border: 1px solid rgba(244,114,182,0.25);
      border-radius: 9px;
      color: var(--accent);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      background: rgba(244,114,182,0.25);
      transform: scale(1.1);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text2);
    }

    .empty-state .emoji { font-size: 3rem; display: block; margin-bottom: 12px; animation: bounce 2s infinite; }
    .empty-state p { font-size: 0.95rem; font-weight: 700; }

    /* Stats bar */
    .stats-bar {
      display: none;
      gap: 10px;
      margin-bottom: 20px;
    }

    .stats-bar.visible { display: flex; }

    .stat-chip {
      flex: 1;
      background: rgba(30,41,59,0.8);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Righteous', cursive;
      font-size: 1.6rem;
      background: linear-gradient(135deg, var(--blue3), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 4px;
    }

    /* Floating shapes */
    .shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.07;
      pointer-events: none;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }

    .shape1 { width: 300px; height: 300px; background: var(--blue2); top: -100px; right: -100px; }
    .shape2 { width: 200px; height: 200px; background: var(--accent); bottom: -50px; left: -50px; animation-delay: -3s; }
    .shape3 { width: 150px; height: 150px; background: var(--accent2); top: 50%; left: 10%; animation-delay: -5s; }

    /* Animations */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* Confetti burst (on add) */
    .confetti-wrap {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    .confetti-piece {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 2px;
      animation: confettiFall 1.2s ease both;
    }

    @keyframes confettiFall {
      from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="shape shape1"></div>
  <div class="shape shape2"></div>
  <div class="shape shape3"></div>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <span class="logo-emoji">✅</span> TodoApp
      </div>
      <p class="subtitle">Görevlerini takip et, hayatını organize et!</p>
    </div>

    <!-- User bar (logged in) -->
    <div class="user-bar" id="userBar">
      <div class="user-email">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userEmailText">kullanici@mail.com</span>
      </div>
      <button class="btn-logout" onclick="logout()">🚪 Çıkış</button>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-chip">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Görev</div>
      </div>
      <div class="stat-chip">
        <div class="stat-num" style="background: linear-gradient(135deg, var(--accent3), #059669); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">🎯</div>
        <div class="stat-label">Aktif</div>
      </div>
      <div class="stat-chip">
        <div class="stat-num" style="background: linear-gradient(135deg, var(--accent2), #d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">⚡</div>
        <div class="stat-label">Bu Hafta</div>
      </div>
    </div>

    <!-- Auth card -->
    <div class="card" id="authCard">
      <div class="tabs">
        <button class="tab active" id="tabLogin" onclick="switchTab('login')">🔑 Giriş Yap</button>
        <button class="tab" id="tabRegister" onclick="switchTab('register')">🚀 Kayıt Ol</button>
      </div>

      <!-- Login form -->
      <div id="loginForm">
        <div class="form-group">
          <label class="form-label">📧 Email</label>
          <input class="form-input" type="email" id="loginEmail" placeholder="ornek@mail.com" />
        </div>
        <div class="form-group">
          <label class="form-label">🔒 Şifre</label>
          <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
        </div>
        <button class="btn btn-primary" id="loginBtn" onclick="login()">
          Giriş Yap ✨
        </button>
        <div class="msg" id="loginMsg"></div>
      </div>

      <!-- Register form -->
      <div id="registerForm" style="display:none">
        <div class="form-group">
          <label class="form-label">📧 Email</label>
          <input class="form-input" type="email" id="regEmail" placeholder="ornek@mail.com" />
        </div>
        <div class="form-group">
          <label class="form-label">🔒 Şifre</label>
          <input class="form-input" type="password" id="regPassword" placeholder="En az 6 karakter" onkeydown="if(event.key==='Enter')register()" />
        </div>
        <button class="btn btn-primary" id="registerBtn" onclick="register()">
          Hesap Oluştur 🎉
        </button>
        <div class="msg" id="registerMsg"></div>
      </div>
    </div>

    <!-- Add todo -->
    <div class="card add-section" id="addSection">
      <div class="card-title"><span>✍️</span> Yeni Görev Ekle</div>
      <div class="form-group">
        <input class="form-input" type="text" id="todoTitle" placeholder="Görev başlığı..." onkeydown="if(event.key==='Enter')addTodo()" />
      </div>
      <div class="add-row">
        <input class="form-input" type="text" id="todoDesc" placeholder="Açıklama (opsiyonel)" onkeydown="if(event.key==='Enter')addTodo()" />
        <button class="btn-add" onclick="addTodo()" title="Ekle">+</button>
      </div>
      <div class="msg" id="addMsg"></div>
    </div>

    <!-- Todo list -->
    <div class="card todos-section" id="todosSection">
      <div class="todos-header">
        <div class="card-title" style="margin-bottom:0"><span>📋</span> Görevlerim <span class="todos-count" id="todosCount">0</span></div>
        <button class="btn-refresh" onclick="loadTodos()">🔄 Yenile</button>
      </div>
      <div class="todo-list" id="todoList">
        <div class="empty-state">
          <span class="emoji">🌟</span>
          <p>Henüz görev yok.<br/>İlk görevini ekle!</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    const API = 'http://localhost:8000';
    let token = localStorage.getItem('todo_token') || '';
    let userEmail = localStorage.getItem('todo_email') || '';

    // Init
    if (token) showDashboard();

    function switchTab(tab) {
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
      setTimeout(() => { el.className = 'msg'; }, 4000);
    }

    function setLoading(btnId, loading, originalText) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.innerHTML = '<span class="loading"></span>Yükleniyor...';
        btn.disabled = true;
      } else {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }

    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value;
      if (!email || !pass) return showMsg('loginMsg', '⚠️ Email ve şifre gerekli!', 'error');

      setLoading('loginBtn', true, 'Giriş Yap ✨');
      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Giriş başarısız');
        token = data.access_token;
        userEmail = email;
        localStorage.setItem('todo_token', token);
        localStorage.setItem('todo_email', email);
        showMsg('loginMsg', '✅ Giriş başarılı!', 'success');
        setTimeout(showDashboard, 600);
      } catch (e) {
        showMsg('loginMsg', '❌ ' + e.message, 'error');
      } finally {
        setLoading('loginBtn', false, 'Giriş Yap ✨');
      }
    }

    async function register() {
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPassword').value;
      if (!email || !pass) return showMsg('registerMsg', '⚠️ Email ve şifre gerekli!', 'error');

      setLoading('registerBtn', true, 'Hesap Oluştur 🎉');
      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Kayıt başarısız');
        token = data.access_token;
        userEmail = email;
        localStorage.setItem('todo_token', token);
        localStorage.setItem('todo_email', email);
        showMsg('registerMsg', '🎉 Hesap oluşturuldu!', 'success');
        setTimeout(showDashboard, 600);
      } catch (e) {
        showMsg('registerMsg', '❌ ' + e.message, 'error');
      } finally {
        setLoading('registerBtn', false, 'Hesap Oluştur 🎉');
      }
    }

    function showDashboard() {
      document.getElementById('authCard').style.display = 'none';
      document.getElementById('userBar').classList.add('visible');
      document.getElementById('statsBar').classList.add('visible');
      document.getElementById('addSection').classList.add('visible');
      document.getElementById('todosSection').classList.add('visible');
      document.getElementById('userEmailText').textContent = userEmail;
      document.getElementById('userAvatar').textContent = userEmail ? userEmail[0].toUpperCase() : '?';
      loadTodos();
    }

    function logout() {
      token = '';
      userEmail = '';
      localStorage.removeItem('todo_token');
      localStorage.removeItem('todo_email');
      document.getElementById('authCard').style.display = 'block';
      document.getElementById('userBar').classList.remove('visible');
      document.getElementById('statsBar').classList.remove('visible');
      document.getElementById('addSection').classList.remove('visible');
      document.getElementById('todosSection').classList.remove('visible');
    }

    async function loadTodos() {
      try {
        const res = await fetch(`${API}/todos/`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.status === 401) { logout(); return; }
        const todos = await res.json();
        renderTodos(todos);
        document.getElementById('statTotal').textContent = todos.length;
      } catch (e) {
        console.error(e);
      }
    }

    function renderTodos(todos) {
      const list = document.getElementById('todoList');
      const count = document.getElementById('todosCount');
      count.textContent = todos.length;

      if (!todos.length) {
        list.innerHTML = `
          <div class="empty-state">
            <span class="emoji">🌟</span>
            <p>Henüz görev yok.<br/>İlk görevini ekle!</p>
          </div>`;
        return;
      }

      list.innerHTML = todos.map((t, i) => `
        <div class="todo-item" style="animation-delay:${i * 0.06}s">
          <div class="todo-dot"></div>
          <div class="todo-content">
            <div class="todo-title">${escHtml(t.title)}</div>
            ${t.description ? `<div class="todo-desc">${escHtml(t.description)}</div>` : ''}
            <div class="todo-meta">📅 ${formatDate(t.created_at)}</div>
          </div>
          <button class="btn-delete" onclick="deleteTodo(${t.id})" title="Sil">🗑️</button>
        </div>
      `).join('');
    }

    async function addTodo() {
      const title = document.getElementById('todoTitle').value.trim();
      const desc = document.getElementById('todoDesc').value.trim();
      if (!title) return showMsg('addMsg', '⚠️ Görev başlığı gerekli!', 'error');

      try {
        const res = await fetch(`${API}/todos/`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ title, description: desc || null })
        });
        if (!res.ok) throw new Error('Eklenemedi');
        document.getElementById('todoTitle').value = '';
        document.getElementById('todoDesc').value = '';
        showMsg('addMsg', '✅ Görev eklendi!', 'success');
        spawnConfetti();
        loadTodos();
      } catch (e) {
        showMsg('addMsg', '❌ ' + e.message, 'error');
      }
    }

    async function deleteTodo(id) {
      try {
        const res = await fetch(`${API}/todos/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('Silinemedi');
        loadTodos();
      } catch (e) {
        console.error(e);
      }
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatDate(dt) {
      if (!dt) return '';
      const d = new Date(dt);
      return d.toLocaleDateString('tr-TR', { day:'numeric', month:'short', year:'numeric' });
    }

    function spawnConfetti() {
      const wrap = document.createElement('div');
      wrap.className = 'confetti-wrap';
      const colors = ['#6366f1','#38bdf8','#f472b6','#facc15','#34d399','#fb923c'];
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        p.style.cssText = `
          left: ${Math.random()*100}%;
          top: ${Math.random()*30}%;
          background: ${colors[Math.floor(Math.random()*colors.length)]};
          animation-delay: ${Math.random()*0.5}s;
          animation-duration: ${0.8 + Math.random()*0.8}s;
          width: ${6 + Math.random()*8}px;
          height: ${6 + Math.random()*8}px;
          border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        `;
        wrap.appendChild(p);
      }
      document.body.appendChild(wrap);
      setTimeout(() => wrap.remove(), 2000);
    }
  </script>
</body>
</html>
